<!--
 [ IMAGES FORMAT IN INDEX.HTML ]
There is no ',' at end!
['image1.webp', 'image2.webp', 'image3.webp', 'image4.webp', 'image5.webp'];
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images Cycle</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: top;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #333333;
        /* Default background color */
        color: #FFFFFF;
        /* Default text color */
        transition: background-color 0.3s, color 0.3s;
        position: relative;
      }

      #image {
        max-width: 90%;
        height: auto;
        cursor: pointer;
        border: 2px solid #000000;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      h1 {
        margin: 10px 0;
        font-size: 18px;
        text-align: center;
      }

      footer {
        margin-top: auto;
        padding: 10px;
        font-size: 14px;
        text-align: center;
      }

      .update-container {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
      }

      .restart-link {
        color: #FFFFFF;
        margin-left: 10px;
      }
    </style>
  </head>
  <body>
    <div class="update-container">
      <p>- tap/click on images -</p>
      <a href="index.html" class="restart-link">- restart -</a>
    </div>
    <img id="image" src="image1.webp" alt="Image 1">
    <script>
      const images = ['image1.webp', 'image2.webp', 'image3.webp', 'image4.webp', 'image5.webp', 'image6.webp', 'image7.webp', 'image8.webp', 'image9.webp', 'image10.webp', 'image11.webp', 'image12.webp', 'image13.webp', 'image14.webp', 'image15.webp'];
      let currentIndex = 0;
      // Preload images
      images.forEach(src => {
        const img = new Image();
        img.src = src;
      });
      document.getElementById('image').addEventListener('click', function() {
        currentIndex = (currentIndex + 1) % images.length;
        this.src = images[currentIndex];
      });
    </script>
  </body>
</html>
