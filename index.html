<!--
 [ IMAGEMAGICK CONVERT TO .WEBP ] 
convert input.jpg -quality 100  -resize 800x800 output.webp

 [ IMAGES FORMAT IN INDEX.HTML ]
There is no ',' at end!
['image1.webp', 'image2.webp', 'image3.webp', 'image4.webp', 'image5.webp'];
-->

<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Images Cycle</title>
		<style>
			body {
				display: flex;
				flex-direction: column;
				justify-content: top;
				align-items: center;
				height: 100vh;
				margin: 0;
				background-color: #191919;
				color: #a58c71;
				transition: background-color 0.3s, color 0.3s;
				position: relative;
			}

			#image {
				max-width: 90%;
				height: auto;
				cursor: pointer;
				border: 2px solid #a58c71;
				border-radius: 8px;
				box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
			}

			h1 {
				margin: 10px 0;
				font-size: 18px;
				text-align: center;
			}

			footer {
				margin-top: auto;
				padding: 10px;
				font-size: 14px;
				text-align: center;
			}

			/* Toggle button styles */
			#toggle-button {
				padding: 3px 6px;
				background-color: #a58c71;
				color: #191919;
				border: none;
				border-radius: 5px;
				cursor: pointer;
				transition: background-color 0.3s, color 0.3s;
				font-size: 12px;
				/* Smaller font size */
				margin-bottom: 5px;
				/* Space between button and text */
			}

			.light-mode {
				background-color: #f0f0f0;
				color: #333333;
			}

			.light-mode #toggle-button {
				background-color: #000000;
				color: #ffffff;
			}

			.update-container {
				display: flex;
				align-items: center;
				margin-bottom: 10px;
			}

			.restart-link {
				color: #a58c71;
				margin-left: 10px;
			}
		</style>
	</head>
	<body>
		<button id="toggle-button">dark/light</button>
		<div class="update-container">
			<p>tap/click on images</p>
			<a href="index.html" class="restart-link">restart</a>
		</div>
		<img id="image" src="image4.webp" alt="">
		<script>
			const images = ['image1.webp', 'image2.webp', 'image3.webp', 'image4.webp', 'image5.webp'];
			let currentIndex = 0;
			images.forEach(src => {
				const img = new Image();
				img.src = src;
			});
			document.getElementById('image').addEventListener('click', function() {
				currentIndex = (currentIndex + 1) % images.length;
				this.src = images[currentIndex];
			});
			// Toggle light/dark mode
			document.getElementById('toggle-button').addEventListener('click', function() {
				document.body.classList.toggle('light-mode');
			});
		</script>
	</body>
</html>
